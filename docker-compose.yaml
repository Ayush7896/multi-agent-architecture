services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: travel_planner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: travel_planner
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      # ── LangSmith observability ──────────────────────────────────────────
      # WHY LANGSMITH_ prefix here?
      #   LangSmith SDK reads LANGSMITH_API_KEY, LANGSMITH_TRACING, LANGSMITH_PROJECT
      #   The older LANGCHAIN_* names still work but are deprecated.
      #   Your .env uses LANGSMITH_ — so we match that exactly.
      #   docker-compose passes these through: ${VAR} = read from your .env file.
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}               # empty string = tracing disabled
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}          # "true" = enable tracing
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-travel-planner} # project name in LangSmith UI
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: frontend/Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      FASTAPI_URL: http://fastapi:8000
    depends_on:
      - fastapi

volumes:
  postgres_data: